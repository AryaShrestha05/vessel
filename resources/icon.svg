<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Rounded square background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- Chevron + cursor gradient (indigo → violet) -->
    <linearGradient id="glyphGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Subtle inner glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Rounded square clip -->
    <clipPath id="roundedSquare">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Subtle glow blob behind glyph -->
  <ellipse cx="512" cy="530" rx="320" ry="240" fill="#4f46e5" opacity="0.12" filter="url(#glow)"/>

  <!-- Terminal prompt glyph: ">" chevron + "_" cursor -->
  <!-- Chevron ">" — thick, bold, centered slightly left -->
  <polyline
    points="320,340 560,512 320,684"
    fill="none"
    stroke="url(#glyphGrad)"
    stroke-width="88"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Cursor block "_" — sits right of where the chevron tip ends -->
  <rect
    x="588" y="614"
    width="156" height="72"
    rx="12" ry="12"
    fill="url(#glyphGrad)"
    opacity="0.9"
  />
</svg>
